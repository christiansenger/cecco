name: Build & Publish Doxygen

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        uses: ssciwr/doxygen-install@v2
        with:
          version: "1.16.1"

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Build Doxygen
        run: doxygen Doxyfile

      - name: Merge Doxygen into website
        run: |
          rm -rf demos/doxygen/html
          mkdir -p demos/doxygen/html
          cp -R doc/html/. demos/doxygen/html/

      - name: Verify output
        run: |
          test -f demos/index.html
          test -f demos/doxygen/html/index.html
          find demos -maxdepth 3 -type f | sort | head -100

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./demos

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
